```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Form Đăng Ký</title>

<style>

body{
    font-family: Arial;
    padding:20px;
}

.form-group{
    margin-bottom:15px;
}

input{
    padding:6px;
    width:250px;
}

.error{
    color:red;
    font-size:14px;
}

.success{
    font-size:20px;
    color:green;
}

.password-box{
    position: relative;
    width: 250px;
}

.password-box input{
    width: 100%;
    padding-right: 35px;
}

.toggle{
    position: absolute;
    right: 8px;
    top: 7px;
    cursor: pointer;
}

#strengthBar{
    width:250px;
    height:8px;
    background:#ddd;
    margin-top:5px;
}

#strengthLevel{
    height:100%;
    width:0%;
}

.counter{
    font-size:13px;
}

</style>
</head>

<body>

<h2>Form Đăng Ký</h2>

<form id="registerForm">

<div class="form-group">
<label>Họ và tên</label><br>
<input type="text" id="fullname" maxlength="50">
<div class="counter" id="nameCounter">0/50</div>
<div class="error" id="fullnameError"></div>
</div>

<div class="form-group">
<label>Email</label><br>
<input type="text" id="email">
<div class="error" id="emailError"></div>
</div>

<div class="form-group">
<label>Số điện thoại</label><br>
<input type="text" id="phone">
<div class="error" id="phoneError"></div>
</div>

<div class="form-group">
<label>Mật khẩu</label><br>

<div class="password-box">
<input type="password" id="password">
<span class="toggle" id="togglePass">👁</span>
</div>

<div id="strengthBar">
<div id="strengthLevel"></div>
</div>

<div class="error" id="passwordError"></div>
</div>

<div class="form-group">
<label>Xác nhận mật khẩu</label><br>
<input type="password" id="confirmPassword">
<div class="error" id="confirmPasswordError"></div>
</div>

<div class="form-group">
<label>Giới tính</label><br>
<input type="radio" name="gender" value="Nam"> Nam
<input type="radio" name="gender" value="Nữ"> Nữ
<div class="error" id="genderError"></div>
</div>

<div class="form-group">
<input type="checkbox" id="terms"> Tôi đồng ý điều khoản
<div class="error" id="termsError"></div>
</div>

<button type="submit">Đăng ký</button>

</form>

<div id="successMessage"></div>

<script>

const form = document.getElementById("registerForm");
const nameCounter = document.getElementById("nameCounter");
const togglePass = document.getElementById("togglePass");
const strengthLevel = document.getElementById("strengthLevel");

const fullname = document.getElementById("fullname");
const email = document.getElementById("email");
const phone = document.getElementById("phone");
const password = document.getElementById("password");
const confirmPassword = document.getElementById("confirmPassword");
const terms = document.getElementById("terms");

const successMessage = document.getElementById("successMessage");


function showError(id,message){
document.getElementById(id+"Error").innerText = message;
}

function clearError(id){
document.getElementById(id+"Error").innerText = "";
}


/* Đếm ký tự họ tên */

fullname.addEventListener("input",function(){

let len = fullname.value.length;

nameCounter.innerText = len + "/50";

clearError("fullname");

});


function validateFullname(){

let value = fullname.value.trim();
let regex = /^[A-Za-zÀ-ỹ\s]+$/;

if(value === ""){
showError("fullname","Không được để trống");
return false;
}

if(value.length < 3){
showError("fullname","Ít nhất 3 ký tự");
return false;
}

if(!regex.test(value)){
showError("fullname","Chỉ chứa chữ cái");
return false;
}

clearError("fullname");
return true;

}


function validateEmail(){

let value = email.value.trim();
let regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if(value === ""){
showError("email","Không được để trống");
return false;
}

if(!regex.test(value)){
showError("email","Email không hợp lệ");
return false;
}

clearError("email");
return true;

}


function validatePhone(){

let value = phone.value.trim();
let regex = /^0\d{9}$/;

if(value === ""){
showError("phone","Không được để trống");
return false;
}

if(!regex.test(value)){
showError("phone","SĐT phải 10 số và bắt đầu bằng 0");
return false;
}

clearError("phone");
return true;

}


/* Password strength */

password.addEventListener("input",function(){

let val = password.value;

let score = 0;

if(val.length >= 8) score++;
if(/[A-Z]/.test(val)) score++;
if(/[a-z]/.test(val)) score++;
if(/\d/.test(val)) score++;

if(score <=1){
strengthLevel.style.width="33%";
strengthLevel.style.background="red";
}
else if(score <=3){
strengthLevel.style.width="66%";
strengthLevel.style.background="orange";
}
else{
strengthLevel.style.width="100%";
strengthLevel.style.background="green";
}

});


function validatePassword(){

let value = password.value;
let regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;

if(value === ""){
showError("password","Không được để trống");
return false;
}

if(!regex.test(value)){
showError("password","Ít nhất 8 ký tự gồm chữ hoa, chữ thường, số");
return false;
}

clearError("password");
return true;

}


function validateConfirmPassword(){

if(confirmPassword.value !== password.value){
showError("confirmPassword","Mật khẩu không khớp");
return false;
}

clearError("confirmPassword");
return true;

}


function validateGender(){

let genders = document.getElementsByName("gender");

for(let g of genders){
if(g.checked){
clearError("gender");
return true;
}
}

showError("gender","Vui lòng chọn giới tính");
return false;

}


function validateTerms(){

if(!terms.checked){
showError("terms","Bạn phải đồng ý điều khoản");
return false;
}

clearError("terms");
return true;

}


/* Toggle password */

togglePass.addEventListener("click",function(){

if(password.type === "password"){
password.type = "text";
}else{
password.type = "password";
}

});


form.addEventListener("submit",function(e){

e.preventDefault();

let valid =
validateFullname() &
validateEmail() &
validatePhone() &
validatePassword() &
validateConfirmPassword() &
validateGender() &
validateTerms();

if(valid){

form.style.display = "none";

successMessage.innerHTML = `
<div class="success">
Đăng ký thành công! 🎉 <br>
Chào mừng ${fullname.value}
</div>
`;

}

});


fullname.addEventListener("blur",validateFullname);
email.addEventListener("blur",validateEmail);
phone.addEventListener("blur",validatePhone);
password.addEventListener("blur",validatePassword);
confirmPassword.addEventListener("blur",validateConfirmPassword);


email.addEventListener("input",()=>clearError("email"));
phone.addEventListener("input",()=>clearError("phone"));
password.addEventListener("input",()=>clearError("password"));
confirmPassword.addEventListener("input",()=>clearError("confirmPassword"));

</script>

</body>
</html>
