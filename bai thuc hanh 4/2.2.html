<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Form đặt hàng</title>

<style>

body{
    font-family: Arial;
    padding:20px;
}

.form-group{
    margin-bottom:15px;
}

input,select,textarea{
    padding:6px;
    width:260px;
}

textarea{
    height:80px;
}

.error{
    color:red;
    font-size:14px;
}

.counter{
    font-size:13px;
}

#confirmBox{
    border:1px solid #ccc;
    padding:15px;
    margin-top:20px;
    display:none;
}

.success{
    color:green;
    font-size:20px;
}

</style>
</head>

<body>

<h2>Đặt hàng trực tuyến</h2>

<form id="orderForm">

<div class="form-group">
<label>Tên sản phẩm</label><br>
<select id="product">
<option value="">-- Chọn sản phẩm --</option>
<option value="Ao">Áo</option>
<option value="Quan">Quần</option>
<option value="Giay">Giày</option>
</select>
<div class="error" id="productError"></div>
</div>

<div class="form-group">
<label>Số lượng</label><br>
<input type="number" id="quantity">
<div class="error" id="quantityError"></div>
</div>

<div class="form-group">
<label>Ngày giao hàng</label><br>
<input type="date" id="delivery">
<div class="error" id="deliveryError"></div>
</div>

<div class="form-group">
<label>Địa chỉ giao</label><br>
<input type="text" id="address">
<div class="error" id="addressError"></div>
</div>

<div class="form-group">
<label>Ghi chú</label><br>
<textarea id="note"></textarea><br>
<span class="counter" id="noteCounter">0/200</span>
<div class="error" id="noteError"></div>
</div>

<div class="form-group">
<label>Thanh toán</label><br>
<input type="radio" name="pay" value="COD"> COD
<input type="radio" name="pay" value="Chuyển khoản"> Chuyển khoản
<input type="radio" name="pay" value="Ví điện tử"> Ví điện tử
<div class="error" id="payError"></div>
</div>

<p>Tổng tiền: <b id="totalPrice">0</b> VND</p>

<button type="submit">Đặt hàng</button>

</form>

<div id="confirmBox">
<h3>Xác nhận đơn hàng</h3>
<p id="orderSummary"></p>
<button id="confirmBtn">Xác nhận</button>
<button id="cancelBtn">Hủy</button>
</div>

<div id="successMessage"></div>


<script>

const prices = {
Ao:150000,
Quan:200000,
Giay:500000
};

const form = document.getElementById("orderForm");

const product = document.getElementById("product");
const quantity = document.getElementById("quantity");
const delivery = document.getElementById("delivery");
const address = document.getElementById("address");
const note = document.getElementById("note");

const noteCounter = document.getElementById("noteCounter");
const totalPrice = document.getElementById("totalPrice");

const confirmBox = document.getElementById("confirmBox");
const orderSummary = document.getElementById("orderSummary");

const confirmBtn = document.getElementById("confirmBtn");
const cancelBtn = document.getElementById("cancelBtn");

const successMessage = document.getElementById("successMessage");


function showError(id,msg){
document.getElementById(id+"Error").innerText = msg;
}

function clearError(id){
document.getElementById(id+"Error").innerText="";
}


function validateProduct(){

if(product.value === ""){
showError("product","Vui lòng chọn sản phẩm");
return false;
}

clearError("product");
return true;

}


function validateQuantity(){

let q = Number(quantity.value);

if(!Number.isInteger(q) || q<1 || q>99){
showError("quantity","Số lượng 1-99");
return false;
}

clearError("quantity");
return true;

}


function validateDate(){

let value = delivery.value;

if(!value){
showError("delivery","Chọn ngày giao");
return false;
}

let today = new Date();
let chosen = new Date(value);

let diff = (chosen - today)/(1000*60*60*24);

if(diff < 0){
showError("delivery","Không chọn ngày quá khứ");
return false;
}

if(diff > 30){
showError("delivery","Không quá 30 ngày");
return false;
}

clearError("delivery");
return true;

}


function validateAddress(){

let value = address.value.trim();

if(value.length < 10){
showError("address","Địa chỉ ít nhất 10 ký tự");
return false;
}

clearError("address");
return true;

}


function validateNote(){

if(note.value.length > 200){
showError("note","Không quá 200 ký tự");
return false;
}

clearError("note");
return true;

}


function validatePay(){

let radios = document.getElementsByName("pay");

for(let r of radios){
if(r.checked){
clearError("pay");
return true;
}
}

showError("pay","Chọn phương thức thanh toán");
return false;

}


function updateTotal(){

let p = product.value;
let q = Number(quantity.value);

if(prices[p] && q){
let total = prices[p]*q;

totalPrice.innerText = total.toLocaleString("vi-VN");
}else{
totalPrice.innerText = "0";
}

}


product.addEventListener("change",updateTotal);
quantity.addEventListener("input",updateTotal);


note.addEventListener("input",function(){

let len = note.value.length;

noteCounter.innerText = len + "/200";

if(len>200){
noteCounter.style.color="red";
}else{
noteCounter.style.color="black";
}

});


form.addEventListener("submit",function(e){

e.preventDefault();

let valid =
validateProduct() &
validateQuantity() &
validateDate() &
validateAddress() &
validateNote() &
validatePay();

if(valid){

let total = totalPrice.innerText;

orderSummary.innerHTML = `
Sản phẩm: ${product.value}<br>
Số lượng: ${quantity.value}<br>
Tổng tiền: ${total} VND<br>
Ngày giao: ${delivery.value}
`;

confirmBox.style.display="block";

}

});


confirmBtn.addEventListener("click",function(){

form.style.display="none";
confirmBox.style.display="none";

successMessage.innerHTML = `
<div class="success">
Đặt hàng thành công 🎉
</div>
`;

});


cancelBtn.addEventListener("click",function(){

confirmBox.style.display="none";

});


product.addEventListener("blur",validateProduct);
quantity.addEventListener("blur",validateQuantity);
delivery.addEventListener("blur",validateDate);
address.addEventListener("blur",validateAddress);
note.addEventListener("blur",validateNote);

</script>

</body>
</html>
